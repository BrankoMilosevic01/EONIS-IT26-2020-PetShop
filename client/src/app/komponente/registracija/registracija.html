<div style="max-width: 450px; margin: 30px auto; padding: 25px; border: 2px solid #ffb74d; border-radius: 15px; text-align: center; font-family: 'Nunito', sans-serif; background-color: #fffaf0; box-shadow: 0 4px 15px rgba(255,183,77,0.2);">
  
  <h2 style="color: #ff7043; margin-top: 0;">📝 Registracija Naloga</h2>
  <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Popunite podatke kako bismo znali gde da šaljemo Vaše porudžbine!</p>
  
  <div style="margin-bottom: 12px;">
    <input type="text" [(ngModel)]="korisnik.imePrezime" autocomplete="off" placeholder="Ime i Prezime" style="width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <div style="margin-bottom: 12px;">
    <input type="email" [(ngModel)]="korisnik.email" autocomplete="off" placeholder="Email (npr. petar@gmail.com)" style="width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <div style="margin-bottom: 20px;">
    <input type="password" [(ngModel)]="korisnik.lozinka" autocomplete="new-password" placeholder="Lozinka (min 6 karaktera, sa znakovima)" style="width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <hr style="border: 0; border-top: 1px solid #ffcc80; margin-bottom: 20px;">
  <h4 style="text-align: left; margin: 0 0 10px; color: #d84315;">📍 Adresa za isporuku</h4>

  <div style="display: flex; gap: 10px; margin-bottom: 12px;">
    <input type="text" [(ngModel)]="korisnik.ulica" autocomplete="off" placeholder="Naziv ulice" style="flex: 2; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
    <input type="text" [(ngModel)]="korisnik.kucniBroj" autocomplete="off" placeholder="Kućni br." style="flex: 1; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <div style="margin-bottom: 12px;">
    <input type="text" [(ngModel)]="korisnik.brojStana" autocomplete="off" placeholder="Broj stana/sprat (opciono)" style="width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <div style="display: flex; gap: 10px; margin-bottom: 25px;">
    <input type="text" [(ngModel)]="korisnik.mesto" autocomplete="off" placeholder="Mesto / Grad" style="flex: 2; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
    <input type="text" [(ngModel)]="korisnik.postanskiBroj" autocomplete="off" placeholder="Poštanski br." style="flex: 1; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; outline: none;" />
  </div>

  <button (click)="registrujSe()" style="width: 100%; padding: 14px; background-color: #29b6f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(41, 182, 246, 0.3);">
    Potvrdi i Registruj se ✅
  </button>

  <p style="color: #e53935; margin-top: 15px; font-weight: bold;">{{ poruka }}</p>
</div>
